var FS=`#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fc;
uniform float uT;
uniform vec2 uR;
uniform sampler2D uTx;

vec3 m289(vec3 x){return x-floor(x/289.)*289.;}
vec2 m289(vec2 x){return x-floor(x/289.)*289.;}
vec3 pm(vec3 x){return m289(((x*34.)+1.)*x);}

float sn(vec2 v){
  const vec4 C=vec4(.2113,.3660,-.5773,.0243);
  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);
  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=m289(i);
  vec3 p=pm(pm(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m;m=m*m;
  vec3 x_=2.*fract(p*C.www)-1.,h=abs(x_)-.5,ox=floor(x_+.5),a0=x_-ox;
  m*=1.7928-.8537*(a0*a0+h*h);
  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

  float t = uT;
  
  float breath1 = 0.5 + 0.5 * sin(t * 0.22);
